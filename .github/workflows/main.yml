name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12 # Chuyển sang build trên macOS để tránh lỗi Toolchain của Linux

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: roothide/setup-theos@master # Dùng fork cực kỳ ổn định này
        with:
          theos-src: https://github.com/theos/theos.git

      - name: Tiến hành Build Tweak
        run: |
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4.8-Final
          path: packages/*.deb
