name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13 # Dùng macOS 13 để tránh hàng chờ dài của macOS 12

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Cài đặt Theos & SDK
        # Đây là Action uy tín nhất hiện nay dành cho Tweak iOS
        uses: theos/setup-theos-action@v1.0.3 
        with:
          # Tự động tải SDK phù hợp nhất cho iPhone 6s Plus
          sdk-url: https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz

      - name: Tiến hành Build Tweak
        run: |
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4.8-iPhone6sPlus
          path: packages/*.deb
